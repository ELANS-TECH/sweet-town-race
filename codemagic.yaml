workflows:
  ios-release:
    name: Sweet Town Race - iOS release
    instance_type: mac_mini_m2
    max_build_duration: 60

    # App Store Connect API key saved in Codemagic under this exact name.
    # NOTE: `integrations` belongs at the workflow level, not inside `environment`.
    integrations:
      app_store_connect: Codemagic Key

    environment:
      vars:
        BUNDLE_ID: "com.elanstech.sweettownrace"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_VERSION: "1.0.0"
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Create the iOS project (no Mac needed locally)
        script: |
          # `ios/` is gitignored, so Capacitor regenerates it fresh on every build.
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Generate app icon and launch screen
        script: npx capacitor-assets generate --ios

      - name: Make the app iPhone-only
        script: |
          set -e
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          # Force every configuration to iPhone (1). Handles "1,2" and bare 1,2 forms.
          sed -i '' -E 's/TARGETED_DEVICE_FAMILY = "[^"]*";/TARGETED_DEVICE_FAMILY = 1;/g' "$PBX"
          sed -i '' -E 's/TARGETED_DEVICE_FAMILY = [0-9][0-9,]*;/TARGETED_DEVICE_FAMILY = 1;/g' "$PBX"
          # If Capacitor's template ever omits the setting, add it next to the bundle id.
          if ! grep -q "TARGETED_DEVICE_FAMILY" "$PBX"; then
            perl -0pi -e 's/(PRODUCT_BUNDLE_IDENTIFIER = [^;]*;)/$1\n\t\t\t\tTARGETED_DEVICE_FAMILY = 1;/g' "$PBX"
          fi
          echo "--- TARGETED_DEVICE_FAMILY entries ---"
          grep -n "TARGETED_DEVICE_FAMILY" "$PBX"
          TOTAL=$(grep -c "TARGETED_DEVICE_FAMILY" "$PBX" || true)
          IPHONE_ONLY=$(grep -c "TARGETED_DEVICE_FAMILY = 1;" "$PBX" || true)
          if [ "$TOTAL" -eq 0 ] || [ "$TOTAL" != "$IPHONE_ONLY" ]; then
            echo "ERROR: iPad is still enabled somewhere ($IPHONE_ONLY of $TOTAL are iPhone-only)."
            exit 1
          fi
          echo "OK: all $TOTAL configurations are iPhone-only."

      - name: Configure Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          PB=/usr/libexec/PlistBuddy

          set_string () {
            $PB -c "Set :$1 $2" "$PLIST" 2>/dev/null || $PB -c "Add :$1 string $2" "$PLIST"
          }
          set_bool () {
            $PB -c "Set :$1 $2" "$PLIST" 2>/dev/null || $PB -c "Add :$1 bool $2" "$PLIST"
          }

          # Camera / photo permission text. Must be specific or review flags it (5.1.1).
          set_string NSCameraUsageDescription \
            "Take a photo so you can appear as the driver of your car. Photos stay on this device and are never uploaded or shared."
          set_string NSPhotoLibraryUsageDescription \
            "Choose a photo so you can appear as the driver of your car. Photos stay on this device and are never uploaded or shared."

          # Portrait only, fullscreen, no status bar.
          $PB -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          $PB -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          set_bool UIRequiresFullScreen true
          set_bool UIStatusBarHidden true
          set_bool UIViewControllerBasedStatusBarAppearance false

          # Skips the export-compliance question on every upload (no encryption used).
          set_bool ITSAppUsesNonExemptEncryption false

          $PB -c "Print" "$PLIST" | head -40

      - name: Set version and build number
        script: |
          cd ios/App
          agvtool new-marketing-version "$APP_VERSION"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Initialise the signing keychain
        script: keychain initialize

      - name: Fetch (or create) the signing certificate and profile
        script: |
          # Pulls the App Store profile for this bundle ID from Apple via the
          # App Store Connect API key, and creates the certificate/profile if
          # they are missing. This replaces the `ios_signing` block — mixing the
          # two is what caused "No matching profiles found".
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Install the certificate into the keychain
        script: keychain add-certificates

      - name: Apply signing profile
        script: xcode-project use-profiles

      - name: Build the IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CODE_SIGN_STYLE=Manual TARGETED_DEVICE_FAMILY=1"

      - name: Verify the built app is iPhone-only
        script: |
          set -e
          # Definitive check: read UIDeviceFamily out of the finished binary.
          # App Store Connect decides iPhone/iPad support from this value.
          IPA=$(ls build/ios/ipa/*.ipa | head -1)
          rm -rf /tmp/ipacheck && mkdir -p /tmp/ipacheck
          unzip -q "$IPA" -d /tmp/ipacheck
          APP_PLIST=$(ls -d /tmp/ipacheck/Payload/*.app/Info.plist | head -1)
          echo "UIDeviceFamily in the built app:"
          /usr/libexec/PlistBuddy -c "Print :UIDeviceFamily" "$APP_PLIST"
          FAMILIES=$(/usr/libexec/PlistBuddy -c "Print :UIDeviceFamily" "$APP_PLIST" \
                     | grep -Eo '[0-9]+' | tr '\n' ' ' | xargs)
          if [ "$FAMILIES" != "1" ]; then
            echo "ERROR: expected device family 1 (iPhone) only, got: [$FAMILIES]"
            echo "Family 2 = iPad. Stopping so an iPad-enabled build is never uploaded."
            exit 1
          fi
          echo "CONFIRMED: iPhone-only build. No iPad screenshots will be required."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      email:
        recipients:
          - elanba.amine@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Flip to true only when you are ready to push a build straight to review.
        submit_to_app_store: false
